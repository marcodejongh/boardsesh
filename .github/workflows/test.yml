name: Web Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/web/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'packages/web/**'
      - 'packages/shared-schema/**'
      - 'packages/db/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build shared-schema
      run: bun run --filter=@boardsesh/shared-schema build

    - name: Build db package
      run: bun run --filter=@boardsesh/db build

    - name: Run linting
      run: bun run lint

    - name: Run type checking
      run: bunx tsc --noEmit
      working-directory: packages/web

    - name: Run tests
      run: bun run --filter=@boardsesh/web test:run

  test-coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build shared-schema
      run: bun run --filter=@boardsesh/shared-schema build

    - name: Build db package
      run: bun run --filter=@boardsesh/db build

    - name: Run tests with coverage
      run: bun run --filter=@boardsesh/web test:run -- --coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: success()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./packages/web/coverage/lcov.info
