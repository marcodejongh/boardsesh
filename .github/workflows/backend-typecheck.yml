name: Backend TypeScript Check

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - '.github/workflows/backend-typecheck.yml'
  pull_request:
    paths:
      - 'packages/backend/**'
      - 'packages/shared-schema/**'
      - '.github/workflows/backend-typecheck.yml'

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared-schema
        run: bun run --filter=@boardsesh/shared-schema build

      - name: Build crypto package
        run: bun run --filter=@boardsesh/crypto build

      - name: Build db package
        run: bun run --filter=@boardsesh/db build

      - name: Build aurora-sync package
        run: bun run --filter=@boardsesh/aurora-sync build

      - name: TypeScript check backend
        run: bun run --filter=boardsesh-backend build
