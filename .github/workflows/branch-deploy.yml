name: Branch Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: branch-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/marcodejongh/boardsesh-web:pr-${{ github.event.pull_request.number }}
          build-args: |
            NEXT_PUBLIC_WS_URL=wss://${{ github.event.pull_request.number }}.ws.preview.boardsesh.com/graphql
            BASE_URL=https://${{ github.event.pull_request.number }}.preview.boardsesh.com
          cache-from: |
            type=gha,scope=web-pr-${{ github.event.pull_request.number }}
            type=gha,scope=web-main
          cache-to: type=gha,mode=max,scope=web-pr-${{ github.event.pull_request.number }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/marcodejongh/boardsesh-daemon:pr-${{ github.event.pull_request.number }}
          cache-from: |
            type=gha,scope=backend-pr-${{ github.event.pull_request.number }}
            type=gha,scope=backend-main
          cache-to: type=gha,mode=max,scope=backend-pr-${{ github.event.pull_request.number }}

  deploy:
    needs: build-images
    runs-on: [self-hosted, homelab, ephemeral]
    steps:
      - name: Deploy preview containers
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          NETWORK: branch-deploys
        run: |
          # Stop/remove old containers
          docker stop web-pr-${PR_NUM} backend-pr-${PR_NUM} 2>/dev/null || true
          docker rm web-pr-${PR_NUM} backend-pr-${PR_NUM} 2>/dev/null || true

          # Pull new images
          docker pull ghcr.io/marcodejongh/boardsesh-web:pr-${PR_NUM}
          docker pull ghcr.io/marcodejongh/boardsesh-daemon:pr-${PR_NUM}

          # Start backend
          docker run -d \
            --name backend-pr-${PR_NUM} \
            --network ${NETWORK} \
            -e DATABASE_URL=postgresql://postgres:preview@devdb:5432/main \
            -e REDIS_URL=redis://redis:6379 \
            -e PORT=8080 \
            -e BOARDSESH_URL=https://${PR_NUM}.preview.boardsesh.com \
            -e NEXTAUTH_SECRET=branch-deploy-secret-${PR_NUM} \
            -e NODE_ENV=production \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.backend-pr-${PR_NUM}.rule=Host(\`${PR_NUM}.ws.preview.boardsesh.com\`)" \
            --label "traefik.http.services.backend-pr-${PR_NUM}.loadbalancer.server.port=8080" \
            --memory=256m \
            --restart unless-stopped \
            ghcr.io/marcodejongh/boardsesh-daemon:pr-${PR_NUM}

          # Start web
          docker run -d \
            --name web-pr-${PR_NUM} \
            --network ${NETWORK} \
            -e DATABASE_URL=postgres://postgres:preview@devdb:5432/main \
            -e NEON_PROXY_HOST=neon-proxy \
            -e NEON_PROXY_PORT=4444 \
            -e NEXTAUTH_SECRET=branch-deploy-secret-${PR_NUM} \
            -e NEXTAUTH_URL=https://${PR_NUM}.preview.boardsesh.com \
            -e IRON_SESSION_PASSWORD='{"1":"branch-deploy-session-must-be-32-chars!!"}' \
            -e VERCEL_ENV=preview \
            -e NODE_ENV=production \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.web-pr-${PR_NUM}.rule=Host(\`${PR_NUM}.preview.boardsesh.com\`)" \
            --label "traefik.http.services.web-pr-${PR_NUM}.loadbalancer.server.port=3000" \
            --memory=512m \
            --restart unless-stopped \
            ghcr.io/marcodejongh/boardsesh-web:pr-${PR_NUM}

      - name: Wait for containers to be healthy
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          echo "Waiting for containers to start..."
          sleep 10
          docker ps --filter "name=web-pr-${PR_NUM}" --filter "name=backend-pr-${PR_NUM}" --format "table {{.Names}}\t{{.Status}}"

  comment:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- branch-deploy -->'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- branch-deploy -->
            ## 🔄 Branch Deploy Preview

            | Service | URL |
            |---------|-----|
            | Web | https://${{ github.event.pull_request.number }}.preview.boardsesh.com |
            | Backend | https://${{ github.event.pull_request.number }}.ws.preview.boardsesh.com |
            | Health | https://${{ github.event.pull_request.number }}.ws.preview.boardsesh.com/health |

            **Commit:** ${{ github.event.pull_request.head.sha }}
            **Updated:** ${{ github.event.pull_request.updated_at }}
